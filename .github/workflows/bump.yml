name: Bump Version

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  bump:
    name: Automated Version Bump
    if: "!startsWith(github.event.head_commit.message, 'chore: version')"
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run Release
        # Exit code 21 means "no commits to bump", we treat it as success
        run: |
          uv run poe release || {
            RET=$?
            if [ $RET -eq 21 ]; then
              echo "No commits to bump, skipping."
              exit 0
            else
              exit $RET
            fi
          }

      - name: Push changes
        run: |
          git push
          git push --tags
